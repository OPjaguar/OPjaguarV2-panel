<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280,initial-scale=1">
<title>OPjaguar Panel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0F;--bg2:#111118;--bg3:#17171F;--bg4:#1E1E28;--bg5:#26262F;--brd:#262630;--brd2:#33333E;
  --ink:#F3F3F6;--ink2:#B8B8C4;--ink3:#8A8A98;--ink4:#5A5A68;
  --or:#E07820;--or2:#F0902F;--orbg:rgba(224,120,32,.13);
  --gr:#16a34a;--grbg:rgba(22,163,74,.13);--rd:#dc2626;--rdbg:rgba(220,38,38,.13);
  --cy:#0891b2;--pu:#7c3aed;--pubg:rgba(124,58,237,.13);--bl:#2563eb;--blbg:rgba(37,99,235,.13);--yl:#f59e0b;--ylbg:rgba(245,158,11,.13);
}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;overflow:hidden;font-size:14px;line-height:1.5}
.hidden{display:none!important}
button{font-family:inherit}
input,select,textarea{font-family:inherit}

/* ===== LOGIN ===== */
.login{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:linear-gradient(135deg,#0a0a0a,#1a1a1d 45%,#33333a)}
.login-img{width:120px;height:120px;object-fit:contain;margin-bottom:10px;filter:drop-shadow(0 8px 30px rgba(0,0,0,.6));animation:pop .7s ease}
@keyframes pop{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.login-name{font-size:40px;font-weight:900;margin-bottom:4px}.login-name span{color:var(--or)}
.login-tag{font-size:12px;color:rgba(255,255,255,.5);letter-spacing:2px;margin-bottom:28px;text-transform:uppercase}
.login-box{background:rgba(20,20,26,.75);backdrop-filter:blur(12px);border:1px solid var(--brd);border-radius:18px;padding:30px;width:370px}
.login-box h2{font-size:18px;margin-bottom:6px}.login-box .sub{font-size:13px;color:var(--ink3);margin-bottom:20px}
.login-box input{width:100%;padding:13px 15px;background:var(--bg3);border:1px solid var(--brd);border-radius:10px;color:var(--ink);font-size:14px;margin-bottom:12px;outline:none}
.login-box input:focus{border-color:var(--or)}
.login-box button{width:100%;padding:13px;background:var(--or);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
.login-box button:hover{background:var(--or2)}
.login-err{color:#f87171;font-size:13px;margin-top:12px;text-align:center;display:none}
.login-note{margin-top:16px;font-size:11.5px;color:var(--ink4);text-align:center;line-height:1.6}

/* ===== SHELL ===== */
.app{display:flex;height:100vh}
.sb{width:250px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--brd);display:flex;flex-direction:column;overflow-y:auto}
.sb-head{padding:18px 16px;border-bottom:1px solid var(--brd)}
.sb-brand{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sb-brand img{width:36px;height:36px;object-fit:contain}
.sb-brand .nm{font-size:20px;font-weight:900}.sb-brand .nm span{color:var(--or)}
.sb-user{display:flex;align-items:center;gap:9px;background:var(--bg3);padding:8px 10px;border-radius:10px;cursor:pointer}
.sb-av{width:30px;height:30px;border-radius:50%;background:var(--or);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.sb-user .un{font-size:13px;font-weight:600}.sb-user .ur{font-size:11px;color:var(--ink3)}
.sb-nav{padding:8px;flex:1}
.sb-sec{font-size:10px;letter-spacing:1.3px;color:var(--ink4);text-transform:uppercase;padding:14px 12px 6px;font-weight:600}
.ni{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;cursor:pointer;color:var(--ink2);font-size:13.5px;font-weight:500;border:none;background:none;width:100%;text-align:left;transition:.1s}
.ni:hover{background:var(--bg3);color:var(--ink)}
.ni.active{background:var(--orbg);color:var(--or);font-weight:600}
.ni .ic{width:18px;text-align:center;flex-shrink:0;font-size:15px}
.ni .bdg{margin-left:auto;font-size:11px;font-weight:700;padding:1px 7px;border-radius:9px;background:var(--bg4);color:var(--ink2);min-width:18px;text-align:center}
.ni.active .bdg{background:var(--or);color:#fff}
.ni .dot{margin-left:auto;width:8px;height:8px;border-radius:50%}
.main{flex:1;overflow-y:auto;background:var(--bg);position:relative}
.topbar{position:sticky;top:0;z-index:10;background:rgba(10,10,15,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--brd);padding:12px 28px;display:flex;align-items:center;gap:14px}
.topbar .crumb{font-size:13px;color:var(--ink3)}
.topbar .crumb b{color:var(--ink)}
.topbar .spacer{flex:1}
.topbar .search{background:var(--bg3);border:1px solid var(--brd);border-radius:9px;padding:8px 13px;color:var(--ink);font-size:13px;width:240px;outline:none}
.topbar .search:focus{border-color:var(--or)}
.page{padding:24px 28px;max-width:1280px}
.phead{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.ptitle{font-size:23px;font-weight:800}.psub{font-size:13px;color:var(--ink3);margin-top:3px}

/* ===== COMPONENTES ===== */
.btn{background:var(--or);color:#fff;border:none;padding:10px 17px;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer;transition:.12s}
.btn:hover{background:var(--or2)}
.btn-g{background:transparent;border:1px solid var(--brd2);color:var(--ink2);padding:9px 15px;border-radius:9px;font-size:13px;cursor:pointer}
.btn-g:hover{background:var(--bg3);color:var(--ink)}
.btn-sm{padding:6px 11px;font-size:12px;border-radius:7px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:14px;margin-bottom:20px}
.card{background:var(--bg2);border:1px solid var(--brd);border-radius:14px;padding:17px}
.card .lbl{font-size:12px;color:var(--ink3);margin-bottom:7px;display:flex;align-items:center;gap:6px}
.card .val{font-size:27px;font-weight:800}
.card .val.or{color:var(--or)}.card .val.gr{color:#4ade80}.card .val.bl{color:#60a5fa}.card .val.pu{color:#a78bfa}
.card .sub{font-size:11.5px;color:var(--ink4);margin-top:4px}
.block{background:var(--bg2);border:1px solid var(--brd);border-radius:14px;padding:19px;margin-bottom:18px}
.block-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
.block-t{font-size:15.5px;font-weight:700;display:flex;align-items:center;gap:8px}
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:10px;border-bottom:2px solid var(--brd);color:var(--ink3);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.3px}
.tbl td{padding:11px 10px;border-bottom:1px solid var(--brd);color:var(--ink)}
.tbl tr:hover td{background:var(--bg3)}
.tag{font-size:11px;font-weight:700;padding:2px 9px;border-radius:7px;display:inline-block;white-space:nowrap}
.tag.or{background:var(--orbg);color:var(--or)}.tag.gr{background:var(--grbg);color:#4ade80}.tag.bl{background:var(--blbg);color:#60a5fa}
.tag.rd{background:var(--rdbg);color:#f87171}.tag.pu{background:var(--pubg);color:#a78bfa}.tag.yl{background:var(--ylbg);color:#fbbf24}.tag.gray{background:var(--bg4);color:var(--ink3)}
.mini{background:var(--bg3);border:1px solid var(--brd);width:31px;height:31px;border-radius:8px;cursor:pointer;color:var(--ink2);font-size:13px;margin-left:4px}
.mini:hover{background:var(--bg4);color:var(--ink)}
.mini.red:hover{background:var(--rdbg);color:#f87171;border-color:#7f1d1d}
.alert{display:flex;gap:11px;padding:13px 16px;border-radius:11px;font-size:13px;line-height:1.55;margin-bottom:18px}
.alert.bl{background:var(--blbg);border:1px solid rgba(37,99,235,.3);color:#93c5fd}
.alert.or{background:var(--orbg);border:1px solid rgba(224,120,32,.3);color:var(--or2)}
.alert.gr{background:var(--grbg);border:1px solid rgba(22,163,74,.3);color:#86efac}
.alert.pu{background:var(--pubg);border:1px solid rgba(124,58,237,.3);color:#c4b5fd}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:980px){.grid2,.grid3,.grid4{grid-template-columns:1fr}}
.empty{text-align:center;padding:38px;color:var(--ink4);font-size:14px}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;color:var(--ink3);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--brd);border-radius:9px;color:var(--ink);font-size:13.5px;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--or)}
.field textarea{min-height:90px;resize:vertical}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--brd);border-radius:16px;padding:25px;width:460px;max-width:94vw;max-height:90vh;overflow-y:auto}
.modal h3{font-size:18px;margin-bottom:18px}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:980px){.kanban{grid-template-columns:1fr}}
.kcol{background:var(--bg2);border:1px solid var(--brd);border-radius:13px;padding:13px;min-height:200px}
.kcol-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;font-size:13px;font-weight:700}
.kcol-h .cnt{font-size:11px;background:var(--bg4);color:var(--ink3);padding:1px 8px;border-radius:9px}
.ktask{background:var(--bg3);border:1px solid var(--brd);border-radius:10px;padding:12px;margin-bottom:9px;cursor:pointer}
.ktask:hover{border-color:var(--brd2)}
.ktask .tt{font-size:13px;font-weight:600;margin-bottom:6px}
.ktask .tm{font-size:11.5px;color:var(--ink3);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ktask .tmove{display:flex;gap:5px;margin-top:9px}
.ktask .tmove button{flex:1;font-size:11px;padding:4px;background:var(--bg4);border:none;color:var(--ink2);border-radius:6px;cursor:pointer}
.ktask .tmove button:hover{background:var(--or);color:#fff}

/* AGENTES */
.agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:15px}
.acard{background:var(--bg2);border:1px solid var(--brd);border-radius:14px;padding:16px;cursor:pointer;transition:.12s}
.acard:hover{border-color:var(--or);transform:translateY(-2px)}
.acard-top{display:flex;align-items:center;gap:11px;margin-bottom:11px}
.aico{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.acard .an{font-size:15px;font-weight:700}.acard .ar{font-size:11.5px;color:var(--ink3)}
.acard .ad{font-size:12.5px;color:var(--ink2);line-height:1.5;margin-bottom:11px;min-height:38px}
.acard-foot{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--ink3)}

/* ESCRITORIO AGENTE */
.desk-head{display:flex;align-items:center;gap:16px;margin-bottom:22px;background:var(--bg2);border:1px solid var(--brd);border-radius:16px;padding:20px}
.desk-head .aico{width:64px;height:64px;font-size:30px;border-radius:15px}
.desk-tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;border-bottom:1px solid var(--brd);padding-bottom:0}
.desk-tab{padding:10px 16px;font-size:13px;color:var(--ink3);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;font-weight:500}
.desk-tab:hover{color:var(--ink)}
.desk-tab.active{color:var(--or);border-bottom-color:var(--or);font-weight:600}
.timeline-item{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--brd)}
.timeline-dot{width:9px;height:9px;border-radius:50%;background:var(--or);margin-top:5px;flex-shrink:0}
.timeline-item .ti-t{font-size:13px}.timeline-item .ti-d{font-size:11.5px;color:var(--ink4)}
.note-card{background:var(--bg3);border:1px solid var(--brd);border-radius:10px;padding:13px;margin-bottom:10px}
.note-card .nh{font-size:11.5px;color:var(--ink4);margin-bottom:5px}
.note-card .nt{font-size:13.5px;line-height:1.5}

/* PIPELINE */
.pipe{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px}
@media(max-width:980px){.pipe{grid-template-columns:1fr 1fr}}
.pstage{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;padding:12px}
.pstage-h{font-size:12px;font-weight:700;margin-bottom:4px}
.pstage-v{font-size:20px;font-weight:800;color:var(--or)}
.pstage-s{font-size:11px;color:var(--ink4)}
.bars{display:flex;align-items:flex-end;gap:14px;height:150px;padding:10px 0}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px}
.bar{width:100%;max-width:42px;background:linear-gradient(180deg,var(--or),#b35c14);border-radius:6px 6px 0 0;min-height:4px}
.bar-lbl{font-size:11px;color:var(--ink3)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--gr);color:#fff;padding:12px 22px;border-radius:10px;font-size:14px;z-index:500;box-shadow:0 8px 24px rgba(0,0,0,.4)}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:5px}::-webkit-scrollbar-thumb:hover{background:var(--bg5)}
</style>
</head>

// Llama a la IA real a través del puente
async function preguntarAgente(agentId, mensaje){
  var ag=agentById(agentId);
  if(!ag) return 'Agente no encontrado.';
  var model = ag.model==='sonnet' ? 'claude-sonnet-4-6' : 'claude-haiku-4-5-20251001';
  var persona = PERSONAS[agentId] || ('Eres '+ag.name+', '+ag.role+' de OPjaguar. Respondes en español chileno.');
  try{
    var r = await fetch(PUENTE_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:model, max_tokens:1024, system:persona, messages:[{role:'user', content:mensaje}] })
    });
    var data = await r.json();
    if(data.error){ return '⚠️ Error: '+(data.error.message||JSON.stringify(data.error)); }
    if(data.content && data.content[0] && data.content[0].text){
      // registrar uso aproximado (si viene)
      if(data.usage){ try{ var u=USAGE[CURRENT_USER.username]; if(u){ u.in+=(data.usage.input_tokens||0); u.out+=(data.usage.output_tokens||0); u.calls++; save('usage',USAGE); } }catch(e){} }
      return data.content[0].text;
    }
    return '⚠️ Respuesta inesperada: '+JSON.stringify(data).slice(0,200);
  }catch(e){
    return '⚠️ No se pudo conectar con el puente. Revisa que la URL sea correcta en Ajustes. ('+e+')';
  }
}

    var bdg='';
    if(n.badge){var cls='';if(n.badgeRed)cls='style="background:var(--rd);color:#fff"';if(n.badgeGr)cls='style="background:var(--gr);color:#fff"';var v=n.badge();if(v||v===0)bdg='<span class="bdg" '+cls+'>'+v+'</span>';}

  });
  document.getElementById('navList').innerHTML=h;
}

  CURRENT_PAGE=id;

  var act=document.getElementById('ni-'+id);if(act)act.classList.add('active');
  var navItem=NAV.find(function(n){return n.id===id;});
  document.getElementById('crumb').innerHTML='<b>'+(navItem?navItem.label:id)+'</b>';
  var mc=document.getElementById('mainContent');var fn=PAGES[id];
  if(typeof fn==='function'){try{mc.innerHTML=fn(arg);}catch(e){mc.innerHTML='<div class="page"><div class="alert or">Error en "'+id+'": '+esc(e&&e.message)+'</div></div>';}}
  else{mc.innerHTML='<div class="page"><div class="empty">Sección en construcción.</div></div>';}
  if(buildNav)buildNav();
  if(act)act.classList.add('active');
  document.querySelector('.main').scrollTop=0;
}

function descargarExcel(agentId){
  var found=FOUND_COMPANIES[agentId]||[];

  var ag=agentById(agentId);
  // Generar CSV (Excel lo abre directo)
  var headers=['Empresa','Ciudad','Tipo','Contacto','Categoria','Fecha encontrada'];
  var lines=[headers.join(',')];
  found.forEach(function(e){
    var row=[e.nombre,e.ciudad,e.tipo,e.contacto,e.categoria,e.fecha].map(function(x){
      var s=String(x||'').replace(/"/g,'""');
      return '"'+s+'"';
    });
    lines.push(row.join(','));
  });
  var csv='\ufeff'+lines.join('\n'); // BOM para que Excel lea acentos
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download='Empresas_'+ag.name.replace(/[^a-zA-Z]/g,'')+'_'+today().replace(/\//g,'-')+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);

}

// Busca empresas reales con IA + búsqueda web, evitando repetir
async function buscarEmpresas(agentId){
  var ag=agentById(agentId);
  var cfg=SEARCH_CFG[agentId];
  if(!cfg){ toast('Este agente no tiene búsqueda configurada'); return; }
  var yaEncontradas=FOUND_COMPANIES[agentId]||[];
  var nombresPrevios=yaEncontradas.map(function(e){return e.nombre;}).join(', ');
  var prompt='Busca en internet '+(cfg.cuota>50?'15':'10')+' empresas reales en '+cfg.zona+'. Tipo de empresa: '+cfg.objetivo+'. '+
    (nombresPrevios?'NO incluyas estas que ya tengo: '+nombresPrevios+'. Busca empresas DIFERENTES y nuevas. ':'')+
    'Para cada empresa dame EXACTAMENTE en este formato (una por línea, sin números): NOMBRE | CIUDAD | TIPO | CORREO O WEB | POR QUÉ ES BUEN CLIENTE. Si no encuentras correo, pon la web o "buscar". Responde SOLO con la lista, sin introducción.';
  var model=ag.model==='sonnet'?'claude-sonnet-4-6':'claude-haiku-4-5-20251001';
  try{
    var r=await fetch(PUENTE_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:model,max_tokens:3000,web_search:true,max_searches:Math.min(8,Math.ceil(cfg.cuota/25)),system:'Eres '+ag.name+', experto en encontrar clientes potenciales. Usas búsqueda web para encontrar empresas reales con datos verídicos.',messages:[{role:'user',content:prompt}]})
    });
    var data=await r.json();
    if(data.error){ return {error:(data.error.message||JSON.stringify(data.error))}; }
    // extraer texto de la respuesta (puede venir en varios bloques por la búsqueda)
    var texto='';
    if(data.content){ data.content.forEach(function(b){ if(b.type==='text')texto+=b.text+'\n'; }); }
    if(data.usage){try{var u=USAGE[CURRENT_USER.username];if(u){u.in+=(data.usage.input_tokens||0);u.out+=(data.usage.output_tokens||0);u.calls++;save('usage',USAGE);}}catch(e){}}
    // parsear líneas tipo NOMBRE | CIUDAD | TIPO | CONTACTO | RAZON
    var nuevas=[];
    texto.split('\n').forEach(function(line){
      if(line.indexOf('|')>0){
        var p=line.split('|').map(function(x){return x.trim();});
        if(p[0] && p[0].length>1 && p[0].indexOf('NOMBRE')<0){
          nuevas.push({nombre:p[0],ciudad:p[1]||'',tipo:p[2]||'',contacto:p[3]||'',razon:p[4]||'',categoria:'Potencial',fecha:today()});
        }
      }
    });
    // evitar duplicados por nombre
    var existentes=yaEncontradas.map(function(e){return e.nombre.toLowerCase();});
    var realmenteNuevas=nuevas.filter(function(n){return existentes.indexOf(n.nombre.toLowerCase())<0;});
    FOUND_COMPANIES[agentId]=yaEncontradas.concat(realmenteNuevas);
    saveFound();
    logAgent(agentId,'Buscó empresas: encontró '+realmenteNuevas.length+' nuevas');
    return {nuevas:realmenteNuevas, total:FOUND_COMPANIES[agentId].length};
  }catch(e){ return {error:String(e)}; }
}

function companyDash(coId,sections){
  var co=companyById(coId);
  var leads=LEADS.filter(function(l){return l.company===coId;});
  var tasks=TASKS.filter(function(t){return t.company===coId;});
  var agents=AGENTS.filter(function(a){return a.company===co.name||(coId==='opmenu'&&a.company==='OPjaguar'&&['neron','donna','theo','vera'].indexOf(a.id)>=0);});
  var pipeline=leads.reduce(function(s,l){return s+(l.value||0);},0);
  var head='<div class="phead"><div style="display:flex;align-items:center;gap:14px"><div class="aico" style="width:54px;height:54px;font-size:26px;background:'+co.color+'22;color:'+co.color+'">'+co.icon+'</div><div><div class="ptitle">'+co.name+'</div><div class="psub">'+co.tagline+'</div></div></div></div>';
  var stats='<div class="cards"><div class="card"><div class="lbl">Prospectos</div><div class="val bl">'+leads.length+'</div></div><div class="card"><div class="lbl">En pipeline</div><div class="val or">'+money(pipeline)+'</div></div><div class="card"><div class="lbl">Tareas activas</div><div class="val">'+tasks.filter(function(t){return t.status!=='done';}).length+'</div></div><div class="card"><div class="lbl">Agentes</div><div class="val pu">'+agents.length+'</div></div></div>';
  var info=sections.map(function(s){return '<div class="block"><div class="block-t" style="margin-bottom:12px">'+s.t+'</div><div style="font-size:13.5px;color:var(--ink2);line-height:1.7">'+s.c+'</div></div>';}).join('');
  var leadsBlock=leads.length?'<div class="block"><div class="block-t" style="margin-bottom:12px">🎯 Prospectos de '+co.name+'</div><table class="tbl"><tbody>'+leads.map(function(l){return '<tr><td><b>'+esc(l.name)+'</b></td><td><span class="tag or">'+l.stage+'</span></td><td>'+money(l.value)+'</td></tr>';}).join('')+'</tbody></table></div>':'';
  return '<div class="page">'+head+stats+info+leadsBlock+'</div>';
}

function guardarPuente(){var u=document.getElementById('puenteInput').value.trim();if(u){setPuente(u);toast('Puente guardado');}}
async function probarPuente(){
  var out=document.getElementById('puenteTest');if(out)out.innerHTML='<span style="color:var(--ink3)">Probando...</span>';
  try{
    var r=await fetch(PUENTE_URL,{method:'GET'});
    var txt=await r.text();
    if(out)out.innerHTML='<span style="color:#4ade80">✓ Puente activo: '+esc(txt.slice(0,50))+'</span>';
  }catch(e){ if(out)out.innerHTML='<span style="color:#f87171">✗ No responde. Revisa la URL.</span>'; }
}

function doReset(){['tasks','leads','comms','docs','events','approvals','agentlog','agentnotes','clients','notes','ideas','plans'].forEach(function(k){try{localStorage.removeItem('opjv2_'+k);}catch(e){}});closeModal();toast('Datos reiniciados. Recargando...');setTimeout(function(){location.reload();},800);}
