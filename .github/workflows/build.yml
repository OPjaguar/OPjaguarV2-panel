name: Build OPjaguar Panel

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependencias
        run: npm install
      - name: Asegurar herramientas de construccion
        run: npm install --save-dev electron@31.0.0 electron-builder@24.13.3
      - name: Construir instalador de Windows
        run: npx --yes electron-builder --win nsis portable --publish never
      - name: Subir instalador de Windows
        uses: actions/upload-artifact@v4
        with:
          name: OPjaguar-Windows
          path: dist/*.exe
          if-no-files-found: warn

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependencias
        run: npm install
      - name: Asegurar herramientas de construccion
        run: npm install --save-dev electron@31.0.0 electron-builder@24.13.3
      - name: Construir instalador de Mac
        run: npx --yes electron-builder --mac dmg --publish never
      - name: Subir instalador de Mac
        uses: actions/upload-artifact@v4
        with:
          name: OPjaguar-Mac
          path: dist/*.dmg
          if-no-files-found: warn
